spring.application.name=ticketmaster

spring.datasource.url=jdbc:postgresql://localhost:5432/ticketmaster
spring.datasource.username=${USER}
spring.datasource.password=

# make ddl-auto create tables first, then run "src/main/resources/schema.sql" after
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
# OSIV keeps the session open through serialization
# so lazy access silently succeeds (firing N+1) instead of throwing LazyInitializationException
# off = fail loudly, fetch explicitly
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
# always execute schema.sql and data.sql on start-up
spring.sql.init.mode=always

spring.data.redis.host=localhost
spring.data.redis.port=6379

booking.expiry-sweep-interval-ms=30000
booking.hold-window-minutes=10
booking.max-tickets-per-user=8
event.on-sale-sweep-interval-ms=30000
queue.admit-interval-ms=1000
queue.admit-rate=500
queue.enqueue-limit=5
queue.enqueue-window-ms=10000
queue.grant-access-window-minutes=10