# Activated with: --spring.profiles.active=prod
#
# Only enable this profile when the app genuinely sits behind a trusted reverse proxy /
# load balancer / CDN that sets (and overwrites) X-Forwarded-For. FRAMEWORK registers Spring's
# ForwardedHeaderFilter, which rewrites the request so HttpServletRequest.getRemoteAddr() returns
# the real client IP from X-Forwarded-For instead of the proxy's IP. This is what makes the
# per-(event, ip) enqueue rate limiter bucket real clients rather than collapsing everyone behind
# the proxy into one bucket.
#
# Do NOT enable when the app is directly internet-exposed: X-Forwarded-For is client-controlled,
# so trusting it without a proxy in front lets callers spoof their IP and evade the rate limiter.
server.forward-headers-strategy=FRAMEWORK
