# Test profile: layered on top of src/main/resources/application.properties (it does NOT
# replace it - only the keys below are overridden). Activated for the whole suite by the
# maven-surefire-plugin config in pom.xml (spring.profiles.active=test), so no per-class
# @ActiveProfiles is needed.
#
# The only override is the datasource: the suite runs against its OWN database so that the
# default `ticketmaster` DB (used by `./mvnw spring-boot:run`) and the `ticketmaster_dev`
# demo DB can never pollute test results, and vice versa. One-time setup:
#   createdb ticketmaster_test
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketmaster_test
