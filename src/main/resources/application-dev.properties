# Local demo profile: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# The production defaults (admit-rate=500, admit-interval-ms=1000) make the waiting
# room invisible by hand - you'd have to fire 500 requests before anyone queues.
# These values make the escape hatch, the backlog, and the drain observable with curl.
queue.admit-rate=2
queue.admit-interval-ms=5000
