# Local demo profile: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# Runs against a SEPARATE database from the test suite (which commits against
# `ticketmaster`). Hand-driven curl walks against a running app commit real rows that
# don't roll back, and the repository tests use global queries (e.g. findByStatus) that
# assume a clean DB - so demoing against `ticketmaster` breaks the suite. This isolates
# the two. One-time setup: `createdb ticketmaster_dev`. Hibernate (ddl-auto=update)
# builds the schema on first dev boot; seed it with `psql -d ticketmaster_dev -f scripts/seed-dev.sql`.
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketmaster_dev
# The production defaults (admit-rate=500, admit-interval-ms=1000) make the waiting
# room invisible by hand - you'd have to fire 500 requests before anyone queues.
# These values make the escape hatch, the backlog, and the drain observable with curl.
queue.admit-rate=2
queue.admit-interval-ms=5000
